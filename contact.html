<head>

<meta property="og:title" content="CONTACT — NOIR ÉCLAT" />
<meta property="og:description" content="ご相談・カウンセリングのご予約はこちらから。あなたの美しさを、ともに。（コンセプト作品）" />
<meta property="og:url" content="https://maaaataku.github.io/noir-eclat-lp/contact.html" />
<meta property="og:image" content="https://maaaataku.github.io/noir-eclat-lp/ogp.jpg" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="CONTACT — NOIR ÉCLAT" />

</head>
<body>

<div data-include="partials/nav.html"></div>

<main class="page">
  <section class="subhero">
    <div class="wrap">
      <span class="eyebrow">Contact</span>
      <h1>あなたの美しさを、<span class="accent">ともに</span>。</h1>
      <p class="lead">ご相談、カウンセリングのご予約はこちらから。あなたに合った美しさの提案を、丁寧にお届けします。</p>
    </div>
  </section>

  <section style="padding-top:0;">
    <div class="wrap">
      <form class="cform" id="contact-form" novalidate>
        <div class="field">
          <label for="name">お名前</label>
          <input id="name" name="name" type="text" required placeholder="山田 花子" />
        </div>
        <div class="field">
          <label for="email">メールアドレス</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com" />
        </div>
        <div class="field">
          <label for="type">お問い合わせ種別</label>
          <select id="type" name="type">
            <option>お問い合わせ</option>
            <option>カウンセリング予約</option>
          </select>
        </div>
        <div class="field">
          <label for="body">本文</label>
          <textarea id="body" name="body" required placeholder="ご相談内容をご記入ください。"></textarea>
        </div>
        <div class="submit-row">
          <button type="submit" class="btn btn-primary">送信する</button>
        </div>
        <p class="form-note">※ 本サイトはコンセプト作品です。フォームは実際には送信されません。</p>
      </form>
      <div class="form-success" id="form-success">
        お問い合わせを受け付けました。ありがとうございます。<br />
        （※ デモのため、実際には送信されていません）
      </div>
    </div>
  </section>
</main>

<div data-include="partials/footer.html"></div>

<script src="include.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const f = document.getElementById('contact-form');
    f.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!f.checkValidity()) { f.reportValidity(); return; }
      f.classList.add('sent');
      document.getElementById('form-success').classList.add('show');
      scrollTo({ top: f.getBoundingClientRect().top + scrollY - 140, behavior: 'smooth' });
    });
  });
</script>
</body>
</html>
